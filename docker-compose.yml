services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: vinemind
      POSTGRES_USER: vinemind
      POSTGRES_PASSWORD: vinemind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinemind -d vinemind"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vinemind:vinemind@postgres:5432/vinemind
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
